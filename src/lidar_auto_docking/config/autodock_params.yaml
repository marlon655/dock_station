docking_server:
  ros__parameters:
    #Number of times the robot gets to attempt
    retries: 10
    # Maximum time allowed for one docking action before canceling.
    docking_timeout_sec: 300.0
    # Distance below which to check abort criteria. should be slightly above docked_distance_threshold (m)
    abort_distance: 0.37
    # Angle offset that triggers abort (radians)
    abort_angle: 0.10
    # Y-offset that triggers abort. (m)
    y_abort_threshold: 0.05
    # The distance to back-off in order to clear the dock connector
    connector_clearance_distance: 0.41
    # Threshold distance that indicates that the robot is docked. (m)
    docked_distance_threshold: 0.30
    # Lateral correction in dock frame. Negative shifts the target to the robot/right side.
    dock_lateral_offset: -0.05
    # Yaw correction in radians. Positive rotates the final target counter-clockwise.
    dock_yaw_offset: 0.03

undocking_server:
  ros__parameters:
  # The distance to back-off in order to clear the dock connector
    connector_clearance_distance: 0.42
