# ══════════════════════════════════════════════════════════════════════════
#  opennav_docking – DockingServer + SimpleChargingDock parameters
#  for Palmares robot docking to base_carregamento via ArUco ID=771 + LiDAR
# ══════════════════════════════════════════════════════════════════════════

dock_pose_estimator:
  ros__parameters:
    marker_id: 771
    marker_size: 0.15
    stop_distance: 0.30
    aruco_timeout: 2.0
    sector_half_deg: 30.0
    close_sector_deg: 60.0
    close_range_m: 0.5
    yaw_filter_alpha: 0.35
    tf_timeout: 0.15
    scan_max_range: 2.5
    center_band_deg: 20.0
    face_range_tolerance: 0.10
    front_x_tolerance: 0.08
    min_lateral_spread: 0.15

charging_manager:
  ros__parameters:
    min_for_task: 40.0
    low_after: 20.0
    emergency: 5.0
    dock_max_fails: 4
    docked_pose_x: 12.7
    docked_pose_y: 0.0
    align_tolerance_xy: 2.0
    centering_sample_s: 2.0
    centering_dead_band: 0.05
    centering_max_correction: 0.30
    undock_speed: -0.15
    undock_duration: 2.0

docking_server:
  ros__parameters:
    # ── Server ──────────────────────────────────────────────────────────
    controller_frequency: 50.0          # Hz – vision-control loop
    initial_perception_timeout: 8.0     # s  – wait for first dock detection
    wait_charge_timeout: 5.0            # s  – wait for charging after dock
    dock_approach_timeout: 45.0         # s  – max time for approach loop
    undock_linear_tolerance: 0.05       # m
    undock_angular_tolerance: 0.05      # rad
    max_retries: 3
    base_frame: base_link
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5      # m – must be > xy_goal_tolerance (0.25) to avoid borderline fail

    # ── Graceful controller ──────────────────────────────────────────────
    controller:
      k_phi: 3.0
      k_delta: 2.0
      beta: 0.4
      lambda: 2.0
      v_linear_min: 0.06
      v_linear_max: 0.18
      v_angular_max: 0.6
      slowdown_radius: 0.4
      use_collision_detection: false    # disable during final dock approach

    # ── Dock plugin registration ─────────────────────────────────────────
    dock_plugins: ['charging_dock']

    charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'

      # Use our dock_pose_estimator node (ArUco → LiDAR fusion)
      use_external_detection_pose: true
      external_detection_timeout: 2.0   # s – fallback if estimator stalls

      # The estimator already publishes the correct robot approach pose
      # (marker_pos - STOP_DISTANCE in approach direction), so zero offsets.
      external_detection_translation_x: 0.0
      external_detection_translation_y: -0.04
      external_detection_rotation_yaw: 0.0
      external_detection_rotation_pitch: 0.0
      external_detection_rotation_roll: 0.0
      filter_coef: 0.1                  # low-pass filter on detected pose

      # Stop when robot center is within 5 cm of the published dock pose.
      # dock_pose_estimator offsets the target so 5 cm lands before contact.
      docking_threshold: 0.05           # m – isDocked() = true threshold (5 cm, tolerante a erros do estimador)

      # Staging pose: 1.0 m in front of dock face (dock at 2.0 m, staging at ~1.0 m)
      staging_x_offset: -1.0            # m – negative = toward robot
      staging_yaw_offset: 0.0

      # No physical battery state in simulation – use position threshold only.
      use_battery_status: false
      use_stall_detection: false

    # ── Dock database ────────────────────────────────────────────────────
    docks: ['base_carregamento']

    base_carregamento:
      type: 'charging_dock'
      frame: 'odom'
      # Ajustar para a pose real do dock no frame fixo usado pelo Nav2.
      pose: [0.0, 0.0, 0.0]

  usb_cam:
    video_device: "/dev/video0"
    image_width: 640
    image_height: 480
    pixel_format: "mjpeg2rgb"     # MJPG → RGB8; se falhar tentar "yuyv2rgb"
    camera_frame_id: "camera_link_optical"
    io_method: "mmap"
    framerate: 30.0

    # Auto-controles
    auto_white_balance: true
    auto_exposure: true
    autofocus: false              # C270 tem foco fixo

    # Arquivo de calibração — o launch file sobrescreve este valor com o caminho
    # absoluto resolvido via os.path.expanduser('~') para evitar hardcodar o usuário
    camera_info_url: "file://home/ubuntu/.ros/camera_info/c270.yaml"

    # Deve corresponder ao gz_frame_id da simulação: "camera_link_optical"
    camera_name: "camera"
    frame_id: "camera_link_optical"
