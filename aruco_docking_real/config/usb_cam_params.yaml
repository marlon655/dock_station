# Parâmetros do driver usb_cam para a Logitech C270
# Usado por: launch/camera_real.launch.py
#
# Tópicos publicados após remaps no launch:
#   /camera/image
#   /camera/camera_info

/**:
  ros__parameters:
    video_device: "/dev/video0"
    image_width: 640
    image_height: 480
    pixel_format: "mjpeg2rgb"
    camera_frame_id: "camera_link_optical"
    io_method: "mmap"
    framerate: 30.0
    auto_white_balance: true
    auto_exposure: true
    autofocus: false
    camera_info_url: "file:///home/ubuntu/.ros/camera_info/c270.yaml"
    camera_name: "camera"
    frame_id: "camera_link_optical"
